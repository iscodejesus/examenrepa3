<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Pedido | AC Coffee</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <h1> Finalizar Pedido</h1>

    <div class="resumen">

        <h2>Resumen de Compra</h2>

        <p>Productos seleccionados en tu carrito.</p>

        <p><strong>Total:</strong> Q0.00</p>

    </div>

    <form onsubmit="confirmarPedido(event)">

        <input type="text"
               placeholder="Nombre Completo"
               required>

        <input type="email"
               placeholder="Correo Electrónico"
               required>

        <input type="tel"
               placeholder="Número de Teléfono"
               required>

        <input type="text"
               placeholder="Dirección de Entrega"
               required>

        <select required>
            <option value="">Método de Pago</option>
            <option>Tarjeta de Crédito</option>
            <option>Tarjeta de Débito</option>
            <option>Efectivo al Recibir</option>
        </select>

        <input type="text"
               placeholder="Número de Tarjeta">

        <input type="text"
               placeholder="Fecha de Vencimiento">

        <input type="text"
               placeholder="CVV">

        <textarea rows="4"
                  placeholder="Notas o instrucciones especiales"></textarea>

        <button type="submit">
            Confirmar Pedido
        </button>

    </form>

</div>

<script>

function confirmarPedido(event){

    event.preventDefault();

    alert(
        "✅ Pedido confirmado\n\nGracias por comprar en AC Coffee ☕"
    );

    window.location.href = "index.html";
}

</script>

</body>
</html>
