<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito AC Coffee</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.producto{
    background:white;
    padding:20px;
    margin:15px auto;
    max-width:500px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:#6F4E37;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#carrito{
    background:white;
    max-width:700px;
    margin:30px auto;
    padding:20px;
    border-radius:10px;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

#total{
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}

</style>
</head>
<body>

<h1>☕ AC Coffee</h1>

<div class="producto">
    <div>
        <h3>Té Chai</h3>
        <p>Q22</p>
    </div>
    <button onclick="agregarCarrito('Té Chai',22)">
        Agregar
    </button>
</div>

<div class="producto">
    <div>
        <h3>Frappé</h3>
        <p>Q30</p>
    </div>
    <button onclick="agregarCarrito('Frappé',30)">
        Agregar
    </button>
</div>

<div class="producto">
    <div>
        <h3>Smoothie</h3>
        <p>Q35</p>
    </div>
    <button onclick="agregarCarrito('Smoothie',35)">
        Agregar
    </button>
</div>

<div id="carrito">

<h2>🛒 Tu Carrito</h2>

<div id="items"></div>

<div id="total">Total: Q0</div>

<br>

<button onclick="vaciarCarrito()">
Vaciar Carrito
</button>

</div>

<script>

let carrito = [];

function agregarCarrito(nombre, precio){

    carrito.push({
        nombre,
        precio
    });

    mostrarCarrito();

    alert(nombre + " agregado al carrito");
}

function mostrarCarrito(){

    let contenedor = document.getElementById("items");

    let total = 0;

    contenedor.innerHTML = "";

    carrito.forEach((producto,index)=>{

        total += producto.precio;

        contenedor.innerHTML += `
        <div class="item">
            <span>${producto.nombre} - Q${producto.precio}</span>

            <button onclick="eliminarProducto(${index})">
                Eliminar
            </button>
        </div>
        `;
    });

    document.getElementById("total").innerHTML =
    "Total: Q" + total;
}

function eliminarProducto(index){

    carrito.splice(index,1);

    mostrarCarrito();
}

function vaciarCarrito(){

    carrito = [];

    mostrarCarrito();
}

</script>

</body>
</html>
