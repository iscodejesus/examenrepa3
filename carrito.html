<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | AC Coffee</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="mostrarCarrito()">

    <nav class="navbar">

        <button class="hamburger" onclick="toggleMenu()">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <ul class="nav">
            <li><a href="index.html">Inicio</a></li>

            <li>
                <a href="#">Menú</a>
                <ul>
                    <li><a href="Bebidas.html">Bebidas</a></li>
                    <li><a href="Postres.html">Panadería y Postres</a></li>
                    <li><a href="Comidas.html">Comidas</a></li>
                </ul>
            </li>

            <li><a href="ubicaciones.html">Ubicaciones</a></li>
            <li><a href="info.html">Acerca de Nosotros</a></li>
            <li><a href="horario.html">Horarios</a></li>
            <li><a href="carrito.html">🛒</a></li>
            <li><a href="contacto.html">Únete a nuestro equipo</a></li>
        </ul>

    </nav>

    <h1 class="titulo-menu">
        Tu Carrito
    </h1>

    <section id="carrito-contenedor"></section>

    <h2 id="total"></h2>

    <center>

        <button class="vaciar-btn" onclick="vaciarCarrito()">
            Vaciar Carrito
        </button>

        <br><br>

        <button class="vaciar-btn" onclick="abrirModal()">
            Finalizar Compra
        </button>

    </center>


    <div id="modalPago" class="modal">

        <div class="modal-contenido">

            <span class="cerrar" onclick="cerrarModal()">
                &times;
            </span>

            <h2>Confirmar Compra ☕</h2>

            <form onsubmit="confirmarCompra(event)">

                <input
                    type="text"
                    placeholder="Nombre Completo"
                    required
                >

                <input
                    type="email"
                    placeholder="Correo Electrónico"
                    required
                >

                <input
                    type="tel"
                    placeholder="Número de Teléfono"
                    required
                >

                <input
                    type="text"
                    placeholder="Dirección de Entrega"
                    required
                >

                <select required>
                    <option value="">
                        Seleccione Método de Pago
                    </option>

                    <option>
                        Tarjeta de Crédito
                    </option>

                    <option>
                        Tarjeta de Débito
                    </option>

                    <option>
                        Efectivo al Recibir
                    </option>
                </select>

                <input
                    type="text"
                    placeholder="Número de Tarjeta"
                >

                <div class="fila">

                    <input
                        type="text"
                        placeholder="MM/AA"
                    >

                    <input
                        type="text"
                        placeholder="CVV"
                    >

                </div>

                <button type="submit">
                    Confirmar Pedido
                </button>

            </form>

        </div>

    </div>

  

</body>
</html>
