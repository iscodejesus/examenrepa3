<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="mostrarCarrito()">

<h1 class="titulo-menu">Tu Carrito</h1>

<section id="carrito-contenedor"></section>

<h2 id="total"></h2>

<center>

<button class="vaciar-btn" onclick="vaciarCarrito()">
Vaciar Carrito
</button>

<br><br>

<button class="vaciar-btn" onclick="mostrarFormulario()">
Finalizar Compra
</button>

</center>

<div id="formulario" style="display:none; background:white; width:80%; margin:30px auto; padding:20px; border-radius:15px;">

<h2>Datos del Pedido</h2>

<input type="text" id="nombre" placeholder="Nombre Completo"><br><br>

<input type="text" id="direccion" placeholder="Dirección"><br><br>

<input type="tel" id="telefono" placeholder="Teléfono"><br><br>

<select id="metodo">
<option>Efectivo</option>
<option>Tarjeta</option>
</select>

<br><br>

<button onclick="confirmarCompra()">
Confirmar Pedido
</button>

</div>

<script src="carrito.js"></script>

</body>
</html>
